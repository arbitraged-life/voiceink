name: CodeQL

# Thin caller. Logic lives in NERV-es/.github (SHA-pinned).
# Shared CodeQL analysis; languages auto-detected (always includes 'actions').
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "27 7 * * 1"

permissions:
  contents: read

jobs:
  codeql:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: NERV-es/.github/.github/workflows/codeql-reusable.yml@f620bf567e49a31537497d5b8b063ca263e4fb15
