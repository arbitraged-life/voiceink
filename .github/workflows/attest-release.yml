name: Build Provenance

# Thin caller. Logic lives in NERV-es/.github (SHA-pinned).
# Signs build-provenance attestations for published release assets.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  attest:
    permissions:
      contents: read
      id-token: write
      attestations: write
