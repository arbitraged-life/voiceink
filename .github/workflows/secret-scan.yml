name: Secret Scan

permissions:
  contents: read

on:
  pull_request:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scanning
        uses: trufflesecurity/trufflehog@v3.94.1
        with:
          extra_args: --results=verified,unknown
