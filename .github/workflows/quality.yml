# Quality gate — delegates to the shared reusable workflow in NERV.
#
# Single source of truth:
#   NERV-es/NERV/.github/workflows/lint-reusable.yml
#
# This stub is byte-identical across every NERV-es fork. The reusable workflow
# auto-detects which languages are present and runs only the relevant linters
# + a gitleaks secret scan. Advisory by default (style annotates, never blocks);
# secret detection always fails. To make style blocking here, set strict: true.
name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    uses: NERV-es/NERV/.github/workflows/lint-reusable.yml@4d90a48b4ea8370863b30ecd0088a44520dcd6e4 # ci-quality-v1
    # with:
    #   strict: true        # hard-fail on any lint finding
    #   swift_strict: true  # SwiftLint --strict (any warning fails)